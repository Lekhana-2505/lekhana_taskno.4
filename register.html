<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #43cea2, #185a9d);
            text-align: center;
            color: white;
        }

        .box {
            background: white;
            color: black;
            padding: 20px;
            width: 300px;
            margin: 100px auto;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px;
        }

        button {
            padding: 10px;
            background: #43cea2;
            color: white;
            border: none;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Register</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username"><br>
            <input type="password" name="password" placeholder="Password"><br>
            <button type="submit">Register</button>
        </form>

        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %}

        <a href="/login">Login</a>
    </div>
</body>

</html>
